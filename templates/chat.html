<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Chat</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">

</head>

<body>

    <div class="outer-card">
        <h1 class="text-center mb-4">Awesome Chat</h1>
        <div class="chat-container">
            <div class="card-body message-container" id="messageContainer">
                <!-- Messages will be displayed here -->
                <div class="card-footer">
                    <div class="input-group">
                        <textarea class="form-control" id="messageInput" placeholder="Type your message..."></textarea>
                        <button class="btn btn-outline-success" id="sendButton" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and Socket.IO -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.1.3/socket.io.js"></script>

    <script>
        var socket = new WebSocket('ws://192.168.100.39:8000');

        // Function to send a message
        function sendMessage() {
            var message = document.getElementById('messageInput').value;
            socket.send(JSON.stringify({ chat_id: 'chat id', data: message }));
            document.getElementById('messageInput').value = '';
        }

        socket.onmessage = function (event) {
            console.log(event.data);
            var messageContainer = document.getElementById('messageContainer');
            var msgData = JSON.parse(event.data);

            // Create a new message element with styling
            var messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.innerHTML = '<p class="mb-1">' + msgData.data + '</p>';

            // Append the message element to the container
            messageContainer.appendChild(messageElement);

            // Scroll to the bottom
            messageContainer.scrollTop = messageContainer.scrollHeight;
        };

        // Attach event listener to the "Send" button
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        ontainer.scrollTop = messageContainer.scrollHeight; // Scroll to the bottom
    </script>

</body>

</html>
